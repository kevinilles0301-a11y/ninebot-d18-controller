<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FF6B35">
    <meta name="description" content="AURASCOOT - Control your Ninebot D18 scooter via Bluetooth">
    <title>AURASCOOT</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><text y='170' font-size='180' fill='%23FF6B35'>🛴</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><text y='170' font-size='180' fill='%23FF6B35'>🛴</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 400px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 60px;
            margin-bottom: 15px;
        }

        h1 {
            color: #FF6B35;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .status {
            color: #666;
            font-size: 14px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .status.connected {
            background: #d4edda;
            color: #155724;
        }

        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }

        .connect-btn {
            width: 100%;
            padding: 15px;
            background: #FF6B35;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .connect-btn:hover {
            background: #E55A24;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 53, 0.3);
        }

        .connect-btn:active {
            transform: translateY(0);
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .control-btn {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .control-btn:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .control-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .speed-control {
            margin-bottom: 20px;
        }

        .speed-label {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .speed-slider {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #FF6B35;
            cursor: pointer;
            transition: all 0.2s;
        }

        .speed-slider::-webkit-slider-thumb:hover {
            background: #E55A24;
            box-shadow: 0 0 10px rgba(255, 107, 53, 0.5);
        }

        .speed-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #FF6B35;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .speed-slider::-moz-range-thumb:hover {
            background: #E55A24;
            box-shadow: 0 0 10px rgba(255, 107, 53, 0.5);
        }

        .info {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        .emoji {
            font-size: 24px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .logo {
                font-size: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🛴</div>
            <h1>AURASCOOT</h1>
        </div>

        <div id="status" class="status disconnected">❌ Not Connected</div>

        <button class="connect-btn" id="connectBtn" onclick="connectScooter()">🔗 Connect Scooter</button>

        <div class="speed-control">
            <div class="speed-label">
                <span>Speed</span>
                <span id="speedValue">0%</span>
            </div>
            <input type="range" id="speedSlider" class="speed-slider" min="0" max="100" value="0" oninput="updateSpeed(this.value)">
        </div>

        <div class="controls">
            <button class="control-btn disabled" id="accelBtn" onclick="accelerate()"><span class="emoji">⬆️</span> Accelerate</button>
            <button class="control-btn disabled" id="brakeBtn" onclick="brake()"><span class="emoji">⬇️</span> Brake</button>
            <button class="control-btn disabled" id="leftBtn" onclick="turnLeft()"><span class="emoji">⬅️</span> Left</button>
            <button class="control-btn disabled" id="rightBtn" onclick="turnRight()"><span class="emoji">➡️</span> Right</button>
            <button class="control-btn disabled" id="lightBtn" onclick="toggleLight()"><span class="emoji">💡</span> Light</button>
            <button class="control-btn disabled" id="hornBtn" onclick="toggleHorn()"><span class="emoji">📢</span> Horn</button>
        </div>

        <div class="info">
            📱 <strong>How to use:</strong><br>
            1. Tap "Connect Scooter"<br>
            2. Select your Ninebot D18<br>
            3. Use controls to ride!<br>
            4. Add to home screen for app mode
        </div>
    </div>

    <script>
        let bluetoothDevice = null;
        let isConnected = false;

        async function connectScooter() {
            try {
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [
                        { namePrefix: 'Ninebot' },
                        { namePrefix: 'XiaoMi' }
                    ],
                    optionalServices: ['battery_service', 'device_information']
                });

                const server = await bluetoothDevice.gatt.connect();
                isConnected = true;
                updateUI();
                showStatus('✅ Connected to ' + bluetoothDevice.name);
            } catch (error) {
                console.error('Connection failed:', error);
                showStatus('❌ Connection failed');
            }
        }

        function accelerate() {
            if (!isConnected) return;
            console.log('Accelerating...');
            sendCommand('ACCELERATE');
        }

        function brake() {
            if (!isConnected) return;
            console.log('Braking...');
            sendCommand('BRAKE');
        }

        function turnLeft() {
            if (!isConnected) return;
            console.log('Turning left...');
            sendCommand('LEFT');
        }

        function turnRight() {
            if (!isConnected) return;
            console.log('Turning right...');
            sendCommand('RIGHT');
        }

        function toggleLight() {
            if (!isConnected) return;
            console.log('Toggling light...');
            sendCommand('LIGHT');
        }

        function toggleHorn() {
            if (!isConnected) return;
            console.log('Toggling horn...');
            sendCommand('HORN');
        }

        function updateSpeed(value) {
            document.getElementById('speedValue').textContent = value + '%';
            if (isConnected) {
                sendCommand('SPEED:' + value);
            }
        }

        function sendCommand(command) {
            console.log('Sending command:', command);
            // In a real app, this would send data via Bluetooth
        }

        function updateUI() {
            const buttons = document.querySelectorAll('.control-btn');
            buttons.forEach(btn => {
                if (isConnected) {
                    btn.classList.remove('disabled');
                } else {
                    btn.classList.add('disabled');
                }
            });
        }

        function showStatus(message) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            if (isConnected) {
                statusEl.classList.remove('disconnected');
                statusEl.classList.add('connected');
            } else {
                statusEl.classList.remove('connected');
                statusEl.classList.add('disconnected');
            }
        }

        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
        }
    </script>
</body>
</html>
